<div class="post__toc">

</div>
<h2 id="mcetoc_1j7slbnljps" data-start="105" data-end="133"><span style="color: #4a3c8d;">Pourquoi est-ce important ?</span></h2>
<p>Créer des flux Power Automate cohérents, performants et faciles à maintenir commence par la mise en place de <strong data-start="203" data-end="243">règles de nommage standardisées</strong>.<br data-start="277" data-end="280">Cette uniformisation permet de <strong data-start="320" data-end="350">faciliter la collaboration</strong> entre les membres de l’équipe de développement, <strong data-start="382" data-end="422" data-is-only-node="">simplifier le diagnostic des erreurs</strong> et <strong data-start="426" data-end="474">accélérer le la maintenance</strong> de vos automatisations.</p>
<p>Dans toutes les conventions de nommage, Microsoft recommande d'éviter d'utiliser les accents et les espaces en utilisant la notation camelCase ou un "_". Par exemple <code data-start="798" data-end="824">sendEmailNotification</code> ou <code data-start="828" data-end="856">send_email_notification</code>.</p>
<p>Personnellement je préfère utiliser une nomenclature assez standard pour les noms de flux et d'action, et utiliser le camelCase pour les noms de variable.</p>
<p class="msg msg--highlight " data-start="105" data-end="133">⚠️  Pensez toujours à nommer vos actions au moment de leur création. Car le renommage a postériori peut poser problème si vous utilisez ces actions dans des expressions Power Automate.</p>
<h2 id="mcetoc_1j7sk6eden4" data-start="105" data-end="133"><span style="color: #4a3c8d;">Noms des flux </span></h2>
<p data-start="135" data-end="325">Le nom d’un flux doit <strong data-start="157" data-end="183">commencer par un verbe</strong> (une action) et <strong data-start="198" data-end="229">décrire le résultat attendu.</strong></p>
<p data-start="135" data-end="325">Si le flux appartient à une solution, il est recommandé d'ajouter en préfixe le nom de la solution.</p>
<p data-start="135" data-end="325"><code>Contract Database - approveContract</code></p>
<hr data-start="1272" data-end="1275">
<h2 id="mcetoc_1j7sljauupv"><span style="color: #4a3c8d;">Noms des actions</span></h2>
<p data-start="1311" data-end="1623">Le nom d’une action doit <strong data-start="1336" data-end="1387">toujours commencer par sa description d’origine</strong> (celle proposée par Power Automate). Cela aide les développeurs à identifier rapidement l’action utilisée sans avoir à la déplier.</p>
<p data-start="1311" data-end="1623">Ensuite, ajoutez une description complémentaire sur ce que fait l’action dans le contexte du flux.</p>
<p data-start="1625" data-end="1739">Utilisez les majuscules appropriées et <strong data-start="1664" data-end="1738">séparez la description de l’action et son contexte avec un tiret</strong>.</p>
<p data-start="1625" data-end="1739"><code>Get items - openTickets</code></p>
<p data-start="1625" data-end="1739"><code>Send an email (V2) - dailyReportToManagers</code></p>
<hr data-start="2230" data-end="2233">
<h2 id="mcetoc_1j7sk6edena" data-start="2235" data-end="2274"><span style="color: #4a3c8d;">Noms de déclencheurs</span> </h2>
<p data-start="2276" data-end="2331">Les noms de déclencheurs varient selon le type de flux. Je conseille encore une fois de conserver le nom d'origine du déclencheur et d'y ajouter des élements contextuels.</p>
<p><span style="color: #4a3c8d;"><strong>Flux automatisés</strong></span></p>
<p>Inclure <strong style="font-size: inherit;" data-start="2362" data-end="2402">le nom de la liste ou de l’événement</strong><span style="font-size: inherit;"> dans le nom du déclencheur.</span></p>
<p data-start="2354" data-end="2492"><code>When An Item Is Created - incidentTicket</code></p>
<p id="mcetoc_1j7sk6edenc" data-start="2494" data-end="2512"><span style="color: #4a3c8d;"><strong>Flux planifiés</strong></span></p>
<p data-start="2513" data-end="2623">Afficher <strong data-start="2522" data-end="2552">la fréquence de récurrence</strong>.<br data-start="2553" data-end="2556"><br data-start="2569" data-end="2572"><code><em data-start="2572" data-end="2623">Recurrence - everyMonthOn1st</em></code></p>
<p id="mcetoc_1j7sk6edend" data-start="2625" data-end="2645"><span style="color: #4a3c8d;"><strong>Flux instantanés</strong></span></p>
<p data-start="2646" data-end="2794">Décrire <strong data-start="2654" data-end="2691">l’événement qui déclenche le flux</strong>.<br data-start="2692" data-end="2695"><br data-start="2708" data-end="2711"><code><em data-start="2711" data-end="2794">Manually Trigger A Flow - clickOnEscalationButton</em></code></p>
<p id="mcetoc_1j7sk6edene" data-start="2796" data-end="2822"><span style="color: #4a3c8d;"><strong>Flux liés à Power Apps</strong></span></p>
<p data-start="2823" data-end="2964">Indiquer <strong data-start="2832" data-end="2863">l’action dans l’application</strong> qui démarre le flux.<br data-start="2884" data-end="2887"><br data-start="2900" data-end="2903"><code>Power Apps (V2) - userSubmitsFile</code></p>
<hr data-start="2966" data-end="2969">
<h2 id="mcetoc_1j7sk6edenf" data-start="2971" data-end="3008">Noms de variables </h2>
<p data-start="3010" data-end="3246">Le nom d’une variable doit <strong data-start="3037" data-end="3069">commencer par le préfixe “v”</strong>, suivi d’une description claire de son contenu ou objectif.<br data-start="3129" data-end="3132">Utilisez le <strong data-start="3144" data-end="3157">camelCase</strong> (pas d’espaces, chaque mot commence par une majuscule après le premier).<br data-start="3230" data-end="3233">Soyez concis.</p>
<div class="_tableContainer_1rjym_1">
<div class="group _tableWrapper_1rjym_13 flex w-fit flex-col-reverse" tabindex="-1">
<table class="w-fit min-w-(--thread-content-width)" data-start="3285" data-end="3601">
<thead data-start="3285" data-end="3327">
<tr data-start="3285" data-end="3327">
<th data-start="3285" data-end="3299" data-col-size="sm">Bon exemple</th>
<th data-start="3299" data-end="3317" data-col-size="sm">Mauvais exemple</th>
<th data-start="3317" data-end="3327" data-col-size="md">Raison</th>
</tr>
</thead>
<tbody data-start="3371" data-end="3601">
<tr data-start="3371" data-end="3450">
<td data-start="3371" data-end="3392" data-col-size="sm"><strong data-start="3373" data-end="3391">vQuantityInBox</strong></td>
<td data-col-size="sm" data-start="3392" data-end="3411">varQuantityInBox</td>
<td data-col-size="md" data-start="3411" data-end="3450">Ne pas utiliser “var” comme préfixe</td>
</tr>
<tr data-start="3451" data-end="3545">
<td data-start="3451" data-end="3475" data-col-size="sm"><strong data-start="3453" data-end="3474">vEmployeeFullName</strong></td>
<td data-col-size="sm" data-start="3475" data-end="3497">strEmployeeFullName</td>
<td data-col-size="md" data-start="3497" data-end="3545">Pas besoin de préfixe pour le type de donnée</td>
</tr>
<tr data-start="3546" data-end="3601">
<td data-start="3546" data-end="3563" data-col-size="sm"><strong data-start="3548" data-end="3562">vIsPastDue</strong></td>
<td data-col-size="sm" data-start="3563" data-end="3576">vispastdue</td>
<td data-col-size="md" data-start="3576" data-end="3601">Utiliser le camelCase</td>
</tr>
</tbody>
</table>
</div>
</div>
<hr data-start="3603" data-end="3606">
<h2 id="mcetoc_1j7sk6edenh" data-start="3608" data-end="3671">Noms de références de connexion </h2>
<p data-start="3673" data-end="3981">Le nom d’une référence de connexion doit <strong data-start="3714" data-end="3745">commencer par un nom commun</strong> décrivant le compte de connexion.<br data-start="3779" data-end="3782">Il est suivi par le <strong data-start="3802" data-end="3823">type de connexion</strong>, le <strong data-start="3828" data-end="3850">nom de la solution</strong> et un <strong data-start="3857" data-end="3879">identifiant unique</strong>.<br data-start="3880" data-end="3883">Ces éléments sont généralement générés automatiquement lorsque le flux est créé dans une solution.</p>
