            <p id="ember1348" class="ember-view reader-text-block__paragraph"><span style="color: #000000;">En 2025, Microsoft intègre l’IA au cœur de son environnement, avec une ambition claire : faire de SharePoint bien plus qu’un simple espace de stockage. L’objectif est d’en faire un véritable <strong>assistant intelligent</strong> capable valoriser la masse d’informations présentes dans vos documents.</span></p>
<p id="ember1349" class="ember-view reader-text-block__paragraph"><span style="color: #000000;">Plutôt qu’un produit unique, il s’agit d’un <strong>ensemble de fonctionnalités</strong> intégrées dans l’écosystème Microsoft 365. Leur mission : donner du sens aux fichiers et automatiser les tâches répétitives.</span></p>
<h3 id="ember1350" class="ember-view reader-text-block__heading-3"><span style="color: #000000;">SharePoint Premium (ex Microsoft Syntex)</span></h3>
<p><span style="color: #000000;">Une plateforme avancée de gestion documentaire qui s’appuie sur l’IA pour :</span></p>
<ul>
<li><span style="color: #000000;">Extraire automatiquement des données clés (dates, montants, clauses),</span></li>
<li><span style="color: #000000;">Assembler des modèles ou déclencher des flux d’approbation,</span></li>
<li><span style="color: #000000;">Appliquer vos politiques de sécurité et de conformité.</span></li>
</ul>
<figure ><figure class="post__image post__image--center"><img loading="lazy"  src="https://www.osalydconsulting.com/media/posts/4/1759148598844-2.png" alt="SharePoint Premium" width="691" height="136" sizes="(max-width: 1920px) 100vw, 1920px" srcset="https://www.osalydconsulting.com/media/posts/4/responsive/1759148598844-2-xs.png 640w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148598844-2-sm.png 768w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148598844-2-md.png 1024w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148598844-2-lg.png 1366w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148598844-2-xl.png 1600w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148598844-2-2xl.png 1920w"></figure>
<figcaption >Historique de SharePoint Premium</figcaption>
</figure>
<h3 id="ember1354" class="ember-view reader-text-block__heading-3"><span style="color: #000000;">Copilot pour Microsoft 365</span></h3>
<p id="ember1355" class="ember-view reader-text-block__paragraph"><span style="color: #000000;">Intégré directement dans les applications que vous utilisez au quotidien (Word, Outlook, Teams, SharePoint…), Copilot devient un <strong>assistant de travail transversal</strong>. Dans SharePoint, il vous aide à :</span></p>
<ul>
<li><span style="color: #000000;">Unifier vos contenus en utilisant SharePoint comme socle documentaire pour exploiter les informations dans d'autres outils M365</span></li>
<li><span style="color: #000000;">Générer et synthétiser des contenus pertinents à partir des fichiers et du contenus de vos sites SharePoint</span></li>
</ul>
<figure class="post__image"><img loading="lazy"  src="https://www.osalydconsulting.com/media/posts/4/1759147908174.png" alt="Copilot dans Microsoft 365" width="1241" height="407" sizes="(max-width: 1920px) 100vw, 1920px" srcset="https://www.osalydconsulting.com/media/posts/4/responsive/1759147908174-xs.png 640w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759147908174-sm.png 768w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759147908174-md.png 1024w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759147908174-lg.png 1366w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759147908174-xl.png 1600w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759147908174-2xl.png 1920w"><figcaption>Copilot dans Microsoft 365</figcaption></figure>
<h3 id="ember1358" class="ember-view reader-text-block__heading-3"><span style="color: #000000;">Agents de connaissances SharePoint (Knowledge Agents)</span></h3>
<p id="ember1359" class="ember-view reader-text-block__paragraph">💡Disponible en <em>Public Preview</em> depuis Septembre 2025</p>
<p id="ember1360" class="ember-view reader-text-block__paragraph">De petits assistants spécialisés que vous pouvez utiliser sur un site SharePoint, une page, une liste ou une bibliothèque spécifique. Ils permettent par exemple de :</p>
<ul>
<li>Rechercher l'information à partir d’une base documentaire ciblée (RH, juridique, support…),</li>
<li>Maintenir vos contenus Intranet à jour (liens cassés, pages obsolètes, FAQ automatiques),</li>
<li>Appliquer des métadonnées automatiquement pour préparer vos documents à être exploités par Copilot.</li>
</ul>
<p id="ember1361" class="ember-view reader-text-block__paragraph"></p>
<p id="ember1362" class="ember-view reader-text-block__paragraph">➡️ Pour tester une démo des nouveaux agents SharePoint c'est par ici : <a class="pwHwmXBqmofSClxsctVkNQQzvNIASaSVkFYLg " target="_self" href="https://demos.microsoft.com/microsoft/play/5140/knowledge-agents#/0/1" data-test-app-aware-link="" tabindex="0">https://demos.microsoft.com/microsoft/play/5140/knowledge-agents#/0/1</a></p>
<div class="reader-image-block reader-image-block--full-width"> </div>
<div>
<figure ><figure class="post__image post__image--center"><img loading="lazy"  src="https://www.osalydconsulting.com/media/posts/4/1759148061440-2.png" alt="" width="1086" height="584" sizes="(max-width: 1920px) 100vw, 1920px" srcset="https://www.osalydconsulting.com/media/posts/4/responsive/1759148061440-2-xs.png 640w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148061440-2-sm.png 768w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148061440-2-md.png 1024w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148061440-2-lg.png 1366w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148061440-2-xl.png 1600w ,https://www.osalydconsulting.com/media/posts/4/responsive/1759148061440-2-2xl.png 1920w"></figure>
<figcaption >SharePoint Knowledge Agents</figcaption>
</figure>
<h3 id="ember1364" class="ember-view reader-text-block__heading-3"><span style="color: #000000;">⚠️ Quelques limites à garder en tête</span></h3>
<p id="ember1365" class="ember-view reader-text-block__paragraph">Bien que prometteuse, l’IA dans SharePoint n'est pas magique et il existe quelques points de vigilance à prendre en compte :</p>
<ul>
<li>Un écosystème limité à l'environnement Microsoft.</li>
<li>Un coût additionnel : Copilot est proposé en supplément (30 € / uitilisateur / mois), certaines fonctionnalités avancées de SharePoint Premium sont facturées en pay-as-you-go...</li>
<li>Une dépendance à la qualité de vos contenus : une base documentaire désordonnée entraîne des résultats décevants.</li>
</ul>
<p id="ember1366" class="ember-view reader-text-block__paragraph"></p>
<h3 id="ember1367" class="ember-view reader-text-block__heading-3"><span style="color: #000000;">En conclusion</span></h3>
<p id="ember1368" class="ember-view reader-text-block__paragraph">Avec SharePoint, Microsoft transforme la gestion documentaire en un véritable levier stratégique : automatisation, gouvernance renforcée et exploitation intelligente des connaissances. En combinant <strong>Copilot</strong> et les <strong>Knowledge Agents</strong> vos contenus ne sont plus seulement stockés, mais deviennent <strong>une ressource vivante qui alimente vos décisions</strong>, vos projets et vos collaborateurs.</p>
<p id="ember1369" class="ember-view reader-text-block__paragraph"></p>
</div>
